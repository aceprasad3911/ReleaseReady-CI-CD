name: CI

on:
  push:
    branches: [main, develop, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
      PORT: "3000"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Compile TypeScript
        run: npm run build
      - name: Create test-results directory
        run: mkdir -p test-results
      - name: Run unit tests with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 30
          if-no-files-found: warn
      - name: Upload JUnit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: test-results/junit.xml
          retention-days: 30
          if-no-files-found: warn
      - name: Post coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Test Coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "| Metric | Coverage |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|----------|" >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const fs = require('fs');
              const t = JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8')).total;
              console.log('| Lines | ' + t.lines.pct + '% |');
              console.log('| Functions | ' + t.functions.pct + '% |');
              console.log('| Branches | ' + t.branches.pct + '% |');
              console.log('| Statements | ' + t.statements.pct + '% |');
            " >> "$GITHUB_STEP_SUMMARY"
          fi

  lint-dockerfile:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

    container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t release-ready:ci-scan .
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: release-ready:ci-scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container-scan
      - name: Upload Trivy SARIF as workflow artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-${{ github.sha }}
          path: trivy-results.sarif
          retention-days: 30

  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
